services:

  redis:
    image: redis:7-alpine
    container_name: yt_mp3_redis
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:3.4
    container_name: yt_mp3_localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "localstack_data:/var/lib/localstack"

  api:
    build: .
    container_name: yt_mp3_api
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis
      - localstack
    volumes:
      - .:/app

  worker:
    build: .
    container_name: yt_mp3_worker
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A src.worker.celery_app worker --loglevel=info
    depends_on:
      - redis
      - localstack
    volumes:
      - .:/app

# Al mismo nivel que "services" arriba
volumes:
  localstack_data: